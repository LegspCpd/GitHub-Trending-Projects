name: Fetch Trending GitHub Projects and Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨 1:00 运行
  workflow_dispatch:  # 手动触发用于调试

jobs:
  fetch_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Jinja2 requests

      - name: Fetch trending projects
        run: |
          python fetch_data.py

      - name: Generate static HTML
        run: |
          python generate_html.py

      - name: Clean dist folder
        run: |
          rm -rf dist/*

      - name: Create new dist folder
        run: |
          mkdir -p dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.2.0
        with:
          folder: dist
          repo: legspcpd/github-trending-projects
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages